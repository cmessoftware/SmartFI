# Docker Compose for PostgreSQL

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fin_per_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finly-network

volumes:
  postgres_data:
    driver: local

networks:
  finly-network:
    driver: bridge
