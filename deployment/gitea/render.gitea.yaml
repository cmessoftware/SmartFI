services:
  - type: web
    name: smartfi-gitea
    runtime: docker
    region: oregon
    plan: free
    image:
      url: gitea/gitea:1.22
    healthCheckPath: /
    envVars:
      - key: USER_UID
        value: "1000"
      - key: USER_GID
        value: "1000"
      - key: GITEA__server__DOMAIN
        sync: false
      - key: GITEA__server__ROOT_URL
        sync: false
      - key: GITEA__server__HTTP_PORT
        value: "3000"
      - key: GITEA__database__DB_TYPE
        value: postgres
      - key: GITEA__database__HOST
        sync: false
      - key: GITEA__database__NAME
        sync: false
      - key: GITEA__database__USER
        sync: false
      - key: GITEA__database__PASSWD
        sync: false
      - key: GITEA__database__SSL_MODE
        value: require
      - key: GITEA__security__INSTALL_LOCK
        value: "false"
      - key: GITEA__service__DISABLE_REGISTRATION
        value: "true"
      - key: GITEA__openid__ENABLE_OPENID_SIGNIN
        value: "false"
      - key: GITEA__actions__ENABLED
        value: "false"
    disk:
      name: gitea-data
      mountPath: /data
      sizeGB: 5
