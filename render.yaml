services:
  # Backend API
  - type: web
    name: finly-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: finly-db
          property: connectionString
      - key: GOOGLE_SHEET_ID
        sync: false  # Optional: Configure for backup
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false  # Optional: Paste credentials for Google Sheets backup
      - key: FRONTEND_URL
        sync: false  # Configure after frontend deploys

  # Frontend Static Site
  - type: web
    name: finly-frontend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        sync: false  # Configure with your backend URL

# PostgreSQL Database (Sprint 3)
databases:
  - name: finly-db
    databaseName: fin_per_db
    user: finly_user
    plan: free
    region: oregon
