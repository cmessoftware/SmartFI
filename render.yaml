services:
  # Backend API
  - type: web
    name: finly-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: GOOGLE_SHEET_ID
        sync: false  # Configure with your Google Sheet ID
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false  # Paste your credentials.json content here
      - key: FRONTEND_URL
        sync: false  # Configure after frontend deploys

  # Frontend Static Site
  - type: web
    name: finly-frontend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        sync: false  # Configure with your backend URL

